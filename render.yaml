services:
  - type: web
    name: library-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_VERSION
        value: "24"
      - key: DATABASE_URL
        fromDatabase:
          name: library-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: library-db
    databaseName: library
    plan: free
    postgresMajorVersion: 16
